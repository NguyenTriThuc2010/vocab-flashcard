<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Vocab Flashcard</title>
    
    <!-- iOS / PWA Support -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="VocabCard">
    <link rel="apple-touch-icon" href="icon-192.png">
    
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Sidebar Overlay & Menu -->
    <div class="overlay" id="overlay"></div>
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h2>Cài Đặt & Học</h2>
            <button class="close-btn" id="close-btn">&times;</button>
        </div>
        
        <div class="sidebar-section">
            <h3 class="section-title">Gemini API Key</h3>
            <p style="font-size: 11px; color:#555; margin-bottom:8px">Nhập miễn phí từ Google AI Studio.</p>
            <input type="password" id="api-key-input" class="sidebar-input" placeholder="Nhập API Key...">
            <button class="sidebar-btn" id="save-key-btn">Lưu Key</button>
        </div>

        <div class="sidebar-section">
            <h3 class="section-title">Tạo Từ Bằng AI</h3>
            <input type="text" id="ai-topic-input" class="sidebar-input" placeholder="Chủ đề (VD: Technology)">
            <button class="sidebar-btn ai-btn" id="ai-generate-btn">Tạo 5 Flashcard</button>
            <p class="loading-text" id="ai-loading" style="display: none;">Đang tạo từ vựng...</p>
        </div>

        <div class="sidebar-section list-section">
            <h3 class="section-title">Chọn Chủ Đề Học</h3>
            <ul id="topic-list" class="topic-list">
                <!-- Topics rendered here by JS -->
            </ul>
        </div>
    </aside>

    <div class="app-container">
        <!-- Header: Progress Bar -->
        <header class="header">
            <button class="menu-btn" id="menu-btn">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="3" y1="12" x2="21" y2="12"></line>
                    <line x1="3" y1="6" x2="21" y2="6"></line>
                    <line x1="3" y1="18" x2="21" y2="18"></line>
                </svg>
            </button>
            <div class="progress-wrapper">
                <div class="progress-text"><span id="current-idx">1</span> / <span id="total-idx">16</span></div>
                <div class="progress-bar-container">
                    <div class="progress-bar" id="progress-bar"></div>
                </div>
            </div>
        </header>

        <!-- Main Content: Flashcard -->
        <main class="flashcard-container">
            <div class="flashcard" id="flashcard">
                
                <!-- Front Side -->
                <div class="card-face card-front">
                    <div class="topic-badge" id="card-topic">Topic</div>
                    <div class="word-group">
                        <h1 class="word" id="card-word">word</h1>
                        <p class="pos" id="card-pos">pos</p>
                        <p class="phonetic" id="card-phonetic">/phonetic/</p>
                    </div>
                    <p class="flip-hint">Nhấn để xem nghĩa & ví dụ Writing</p>
                </div>
                
                <!-- Back Side -->
                <div class="card-face card-back">
                    <div class="topic-badge" id="card-topic-back">Topic</div>
                    <div class="word-group word-group-back">
                        <h1 class="word word-small" id="card-word-back">word</h1>
                        <p class="pos" id="card-pos-back">pos</p>
                        <p class="phonetic" id="card-phonetic-back">/phonetic/</p>
                        <p class="meaning" id="card-meaning">
                            <span class="lang-tag">VN</span> meaning
                        </p>
                    </div>
                    
                    <div class="details-group">
                        <div class="collocations-box" id="collocations-container">
                            <strong>Collocations:</strong> <span id="card-collocations"></span>
                        </div>
                        <div class="example-box">
                            <span class="vertical-line"></span>
                            <p class="example-text" id="card-example">example</p>
                        </div>
                        <div class="band-badge" id="card-band">Band 7+</div>
                    </div>
                </div>

            </div>
        </main>

        <!-- Footer Controls -->
        <footer class="controls">
            <button class="btn" id="btn-prev">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M19 12H5"></path><path d="M12 19l-7-7 7-7"></path>
                </svg>
                Trước
            </button>
            <button class="btn" id="btn-next">
                Tiếp
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M5 12h14"></path><path d="M12 5l7 7-7 7"></path>
                </svg>
            </button>
            <button class="btn" id="btn-shuffle">
                Xáo trộn
            </button>
        </footer>
    </div>

    <!-- Scripts -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script src="words.js"></script>
    <script src="app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('ServiceWorker registered'))
                    .catch(err => console.log('ServiceWorker error', err));
            });
        }
    </script>
</body>
</html>
